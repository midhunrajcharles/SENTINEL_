# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# web.conf — REST endpoint and web server configuration
#
# Exposes a set of custom REST handlers under /servicesNS/nobody/sentinel/
# that allow the alert action, external SOAR platforms, and the MCP Server
# to interact with the SENTINEL pipeline programmatically.
#
# All endpoints require valid Splunk session tokens or API keys.
# Sensitive operations (approve, rollback) require the sentinel_admin role.
# =============================================================================

# =============================================================================
# CUSTOM REST ENDPOINT HANDLERS
# Registered via restmap.conf (companion file). Documented here for clarity.
#
# POST /sentinel/orchestrate
#   Ingest a new alert directly into the case queue, bypassing the 60s
#   scripted input poll. Used by sentinel_trigger when direct_invoke=true.
#   Body: { alert_id, alert_type, alert_name, source_host, source_user,
#           raw_risk_score, priority_override }
#   Returns: { case_id, queued_at, estimated_triage_seconds }
#
# GET  /sentinel/cases
#   List all active cases with their current pipeline status.
#   Params: status (filter), limit, offset
#   Returns: { cases: [...], total, page }
#
# GET  /sentinel/cases/<case_id>
#   Full case detail including all agent decision packets.
#   Returns: { case, vanguard_decision, sherlock_report, executor_actions }
#
# POST /sentinel/cases/<case_id>/approve
#   Grant human approval for a case requiring analyst sign-off before
#   Executor proceeds. Requires sentinel_admin role.
#   Body: { approved_by, notes }
#   Returns: { case_id, approved_at, executor_eta_seconds }
#
# POST /sentinel/cases/<case_id>/suppress
#   Mark a case as suppressed (false positive / known benign).
#   Body: { suppressed_by, reason, suppress_duration_hours }
#   Returns: { case_id, suppressed_at, expiry }
#
# POST /sentinel/cases/<case_id>/rollback
#   Trigger rollback of a specific Executor action.
#   Requires sentinel_admin role.
#   Body: { action_id, rolled_back_by, reason }
#   Returns: { action_id, rollback_status, rollback_completed_at }
#
# GET  /sentinel/agents
#   Current health status of all four agents + orchestrator.
#   Returns: { agents: { vanguard, sherlock, executor, sage, orchestrator } }
#
# GET  /sentinel/metrics/summary
#   KPI summary: MTTR, FPR, case volume, cost savings for a given window.
#   Params: earliest (epoch), latest (epoch)
#   Returns: { mttr_avg_min, fpr_pct, total_cases, savings_usd }
#
# POST /sentinel/intel/lookup
#   Trigger a threat intelligence lookup for a given IOC. Results cached
#   in threat_intel_cache KV Store with configurable TTL.
#   Body: { ioc_type, ioc_value }
#   Returns: { vt_score, detections, malware_families, misp_events }
#
# GET  /sentinel/reasoning/<case_id>
#   Full step-by-step "Chain of Thought" explainability trace for every
#   agent that has acted on the case — Vanguard's chain_of_thought,
#   Sherlock's investigation_chain, Executor's action_chain — re-exposed
#   verbatim from the agent decision packets for SOC audit / compliance
#   tooling and external-tool queries (no analysis performed by this
#   endpoint; see reasoning_rest_handler.py and AuditLogger.log_chain_of_thought).
#   Returns: { case_id, found, reasoning: { vanguard, sherlock, executor } }
#
# POST /sentinel/approval/request
#   Raise a human-approval request through the ApprovalGate (auto-resolves
#   immediately for high-confidence/low-risk tiers; blocks on Slack/email
#   notification + response/timeout for eradication actions in the
#   CONTAINMENT_APPROVED band). Used internally by ExecutorAgent and exposed
#   so external SOAR/ChatOps tooling can drive the same gate.
#   Body: { case_id, action, target, justification, confidence_score,
#           timeout_seconds?, requested_by? }
#   Returns: { gate_decision, approval_required, approved, status, request_id, ... }
#
# POST /sentinel/approval/respond
#   Record a human decision for a pending request — accepts either a generic
#   { request_id, response, responder_id } body or a Slack interactive-message
#   callback payload (used as the Slack "Approve"/"Deny" button webhook target).
#   Returns: the resolved ApprovalRequest, or { error } if unknown/already-resolved.
#
# GET  /sentinel/approval/pending
#   List every approval request still awaiting a human response — backs the
#   War Room "Pending Approvals" panel countdown table.
#   Returns: { pending: [...], count }
#
# POST /sentinel/approval/<request_id>/approve
# POST /sentinel/approval/<request_id>/deny
#   Direct approve/deny — used by the War Room dashboard's inline buttons.
#   Body: { responder_id? } (defaults to "analyst")
#   Returns: the resolved ApprovalRequest, or { error } if unknown/already-resolved.
#   See approval_rest_handler.py and approval_gate.ApprovalGate.
# =============================================================================

[settings]
# Enable the custom Splunk Web endpoints (requires appserver to be running)
enableSplunkWebSSL = true

# Allow cross-origin requests from the War Room dashboard when running
# the MCP Server on a different port during development
# SECURITY: restrict to specific origins in production
crossOriginSharingPolicy = http://localhost:3000

# Session token lifetime for REST API clients (24 hours)
login_content     = {}
sessionTimeout    = 86400

# Maximum POST body size for alert ingestion payloads (10 MB)
max_upload_size   = 10

# =============================================================================
# EXPOSED VIEWS
# Register dashboard templates for the Splunk Web navigation bar.
# =============================================================================

[expose:war_room]
pattern         = /sentinel/war_room
methods         = GET
redirect_port   = 8000

[expose:case_detail]
pattern         = /sentinel/cases/*
methods         = GET
redirect_port   = 8000

[expose:reasoning]
pattern         = /sentinel/reasoning/*
methods         = GET
redirect_port   = 8000

[expose:approval]
pattern         = /sentinel/approval/*
methods         = GET,POST
redirect_port   = 8000
