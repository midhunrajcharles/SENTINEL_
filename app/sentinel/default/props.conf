# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# props.conf — Sourcetype definitions and field extraction configuration
#
# All SENTINEL sourcetypes emit structured JSON. AUTO_KV_JSON handles
# top-level field extraction; nested objects use REPORT- transforms.
# TIME_FORMAT uses epoch milliseconds from the agent runtime clock.
# =============================================================================

# -----------------------------------------------------------------------------
# sentinel:orchestrator
# Emitted by sentinel_orchestrator.py at each polling cycle and on every
# case state transition.
# -----------------------------------------------------------------------------
[sentinel:orchestrator]
SHOULD_LINEMERGE  = false
LINE_BREAKER      = ([\r\n]+)
TIME_PREFIX       = "timestamp"\s*:\s*
TIME_FORMAT       = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE           = json
AUTO_KV_JSON      = true
TRUNCATE          = 0

REPORT-orchestrator_case  = extract_case_id
REPORT-orchestrator_agent = extract_agent_name

# -----------------------------------------------------------------------------
# sentinel:audit
# Immutable decision log written by audit_logger.py.
# Fields: timestamp, case_id, agent_name, decision_type, confidence,
#         action_taken, rollback_timer, outcome, user_override
# -----------------------------------------------------------------------------
[sentinel:audit]
SHOULD_LINEMERGE  = false
LINE_BREAKER      = ([\r\n]+)
TIME_PREFIX       = "timestamp"\s*:\s*
TIME_FORMAT       = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE           = json
AUTO_KV_JSON      = true
TRUNCATE          = 0

REPORT-audit_decision     = extract_decision_fields
REPORT-audit_action       = extract_action_fields
REPORT-audit_mitre        = extract_mitre_fields

# Enforce field aliases to CIM Alerts data model
FIELDALIAS-audit_src      = host AS src
FIELDALIAS-audit_user     = user_account AS user
FIELDALIAS-audit_action   = action_taken AS action

# -----------------------------------------------------------------------------
# sentinel:case
# Case lifecycle events written by state_manager.py.
# Fields: case_id, alert_id, status, priority, assigned_agent,
#         risk_score, classification, created_time, updated_time
# -----------------------------------------------------------------------------
[sentinel:case]
SHOULD_LINEMERGE  = false
LINE_BREAKER      = ([\r\n]+)
TIME_PREFIX       = "created_time"\s*:\s*
TIME_FORMAT       = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE           = json
AUTO_KV_JSON      = true
TRUNCATE          = 0

REPORT-case_status        = extract_case_status
REPORT-case_priority      = extract_case_priority

FIELDALIAS-case_host      = affected_host AS dest
FIELDALIAS-case_user      = affected_user AS user

# -----------------------------------------------------------------------------
# sentinel:agent:decision
# Per-agent decision records. All four agents emit this sourcetype.
# Fields: agent_name, decision_type, confidence, input_score, output_score,
#         mitre_tactic, mitre_technique, model_used, latency_ms
# -----------------------------------------------------------------------------
[sentinel:agent:decision]
SHOULD_LINEMERGE  = false
LINE_BREAKER      = ([\r\n]+)
TIME_PREFIX       = "timestamp"\s*:\s*
TIME_FORMAT       = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE           = json
AUTO_KV_JSON      = true
TRUNCATE          = 0

REPORT-decision_agent     = extract_agent_name
REPORT-decision_confidence = extract_confidence_band

# Numeric field typing for analytics
FIELDALIAS-decision_conf  = confidence AS agent_confidence
EVAL-confidence_pct       = round(confidence * 100, 1)

# -----------------------------------------------------------------------------
# sentinel:agent:heartbeat
# Lightweight liveness events from state_manager heartbeat input.
# Fields: agent_name, status, last_case_id, queue_depth, uptime_seconds
# -----------------------------------------------------------------------------
[sentinel:agent:heartbeat]
SHOULD_LINEMERGE  = false
LINE_BREAKER      = ([\r\n]+)
TIME_PREFIX       = "timestamp"\s*:\s*
TIME_FORMAT       = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE           = json
AUTO_KV_JSON      = true

# -----------------------------------------------------------------------------
# sentinel:sage:sweep
# Learning sweep results from agent_sage.py hourly runs.
# Fields: sweep_id, cases_processed, rules_proposed, tp_count, fp_count,
#         mttr_improvement_seconds, cost_savings_usd
# -----------------------------------------------------------------------------
[sentinel:sage:sweep]
SHOULD_LINEMERGE  = false
LINE_BREAKER      = ([\r\n]+)
TIME_PREFIX       = "timestamp"\s*:\s*
TIME_FORMAT       = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE           = json
AUTO_KV_JSON      = true

EVAL-mttr_improvement_min = round(mttr_improvement_seconds / 60, 2)
