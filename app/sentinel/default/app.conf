# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# app.conf — Splunk app metadata and registration
# =============================================================================

[install]
is_configured = 0
build         = 1
version       = 1.0.0

# Prevent automatic upgrade overwrites of local/ config
requires_splunk_version = 9.2.0

[launcher]
version     = 1.0.0
author      = SENTINEL Project
description = SENTINEL: Autonomous Agentic SOC Commander — While your analysts sleep, SENTINEL hunts.

[ui]
label         = SENTINEL
is_visible    = 1
show_in_nav   = 1

# Default view opened when navigating to the app
default_namespace = sentinel
default_view  = sentinel_war_room

[triggers]
# Reload conf namespaces that agents write to at runtime
reload.collections = simple
reload.transforms  = simple
reload.macros      = simple
