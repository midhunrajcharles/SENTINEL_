# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# savedsearches.conf — Detection rules and correlation searches
#
# Each detection rule fires a sentinel_trigger alert action, which calls
# sentinel_orchestrator.py with the notable event ID and alert metadata.
#
# Severity thresholds follow ES conventions:
#   info=1  low=2  medium=3  high=4  critical=5
#
# All SPL references CIM-mapped data models via tstats for performance.
# =============================================================================


# =============================================================================
# DETECTION RULES
# =============================================================================

# -----------------------------------------------------------------------------
# RULE 1: Ransomware — PowerShell Encoded Command Execution
#
# Detects PowerShell invoked with -EncodedCommand or -enc flag, which is a
# common technique used by ransomware loaders (LockBit, Conti, BlackCat) to
# obfuscate payload delivery. Scoped to non-admin users to reduce noise from
# legitimate automation.
# -----------------------------------------------------------------------------
[SENTINEL - Ransomware - PowerShell Encoded Command - Rule]
search          = `sentinel_edr_index` \
                  (process_name="powershell.exe" OR process_name="pwsh.exe") \
                  (process_args="*-EncodedCommand*" OR process_args="*-enc *" OR process_args="*-e *") \
                  NOT [| inputlookup ioc_whitelist_lookup | where ioc_type="process_hash" | fields ioc_value | rename ioc_value as process_hash] \
                  | eval risk_modifier=if(like(user,"%admin%"),0.7,1.0) \
                  | eval base_score=75 \
                  | eval risk_score=round(base_score*risk_modifier,0) \
                  | lookup asset_criticality_lookup asset_name AS host OUTPUT criticality_score \
                  | eval final_score=round(risk_score*(coalesce(criticality_score,1.0)),0) \
                  | eval alert_type="RANSOMWARE_POWERSHELL_ENCODED" \
                  | fields _time, host, user, process_name, process_args, process_hash, parent_process, risk_score, final_score, alert_type
description     = Detects PowerShell invoked with encoded command arguments, a primary \
                  ransomware loader delivery technique. Triggers SENTINEL triage pipeline.
cron_schedule   = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time   = now
counttype       = number of events
quantity        = 0
relation        = greater than
alert.severity  = 4
alert.suppress  = 1
alert.suppress.period = 300s
alert.suppress.fields = host,user
disabled        = 0
action.sentinel_trigger = 1
action.sentinel_trigger.param.alert_type  = RANSOMWARE_POWERSHELL_ENCODED
action.sentinel_trigger.param.auto_triage = true


# -----------------------------------------------------------------------------
# RULE 2: Lateral Movement — SMB Lateral Execution (PsExec Pattern)
#
# Detects ADMIN$ or IPC$ share access followed by service creation on a
# remote host, characteristic of PsExec, CrackMapExec, and similar tools
# used for lateral movement. Correlates network and endpoint telemetry.
# -----------------------------------------------------------------------------
[SENTINEL - Lateral Movement - SMB Lateral Execution - Rule]
search          = `sentinel_network_index` dest_port=445 \
                  [| tstats count FROM datamodel=Network_Traffic \
                     WHERE nodename=All_Traffic \
                     BY All_Traffic.src, All_Traffic.dest \
                     | rename All_Traffic.src AS src All_Traffic.dest AS dest \
                     | fields src, dest] \
                  | join type=inner src \
                    [search `sentinel_edr_index` \
                     (process_name="services.exe" AND parent_process_name="svchost.exe") \
                     | fields host AS src, process_name, user, _time] \
                  | eval alert_type="LATERAL_MOVEMENT_SMB" \
                  | eval risk_score=80 \
                  | fields _time, src, dest, user, process_name, alert_type, risk_score
description     = Detects SMB connections correlated with remote service creation, \
                  indicating lateral movement via PsExec-style techniques.
cron_schedule   = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time   = now
counttype       = number of events
quantity        = 0
relation        = greater than
alert.severity  = 4
alert.suppress  = 1
alert.suppress.period = 600s
alert.suppress.fields = src,dest
disabled        = 0
action.sentinel_trigger = 1
action.sentinel_trigger.param.alert_type  = LATERAL_MOVEMENT_SMB
action.sentinel_trigger.param.auto_triage = true


# -----------------------------------------------------------------------------
# RULE 3: Data Exfiltration — Large Outbound Transfer to Untrusted Destination
#
# Detects sustained high-volume outbound data transfers to external IPs not
# present in the asset register. Threshold of 100 MB in a 10-minute window
# is tuned to avoid triggering on software updates and backup jobs.
# Adjust `bytes_threshold` via macro for environment-specific tuning.
# -----------------------------------------------------------------------------
[SENTINEL - Exfiltration - Large Outbound Transfer - Rule]
search          = `sentinel_network_index` \
                  `sentinel_external_traffic` \
                  | stats sum(bytes_out) AS total_bytes_out, \
                          dc(dest) AS unique_dests, \
                          values(dest) AS destinations \
                    BY src, src_user \
                  | where total_bytes_out > `sentinel_exfil_bytes_threshold` \
                  | lookup asset_criticality_lookup asset_name AS src OUTPUT criticality_score, business_unit \
                  | eval risk_score=round(70*(coalesce(criticality_score,1.0)),0) \
                  | eval alert_type="DATA_EXFILTRATION_LARGE_TRANSFER" \
                  | eval bytes_out_mb=round(total_bytes_out/1048576,2) \
                  | fields _time, src, src_user, bytes_out_mb, unique_dests, destinations, \
                           business_unit, risk_score, alert_type
description     = Detects outbound data transfers exceeding 100 MB in 10 minutes to \
                  external destinations, indicating potential data exfiltration.
cron_schedule   = */10 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time   = now
counttype       = number of events
quantity        = 0
relation        = greater than
alert.severity  = 4
alert.suppress  = 1
alert.suppress.period = 900s
alert.suppress.fields = src,src_user
disabled        = 0
action.sentinel_trigger = 1
action.sentinel_trigger.param.alert_type  = DATA_EXFILTRATION_LARGE_TRANSFER
action.sentinel_trigger.param.auto_triage = true


# -----------------------------------------------------------------------------
# RULE 4: Insider Threat — Off-Hours Privileged Access
#
# Detects privileged account (admin, service account, or PAM-vaulted) logins
# occurring outside defined business hours (22:00–06:00 local time) or on
# weekends. Enriched with impossible travel detection: if the same user
# authenticated from a different geography within the past 2 hours, score
# is escalated to CRITICAL.
# -----------------------------------------------------------------------------
[SENTINEL - Insider Threat - Off-Hours Admin Access - Rule]
search          = `sentinel_identity_index` \
                  (action=success OR action=logon) \
                  `sentinel_privileged_accounts` \
                  | eval hour=strftime(_time,"%H"), dow=strftime(_time,"%w") \
                  | where (hour < 6 OR hour >= 22) OR (dow=0 OR dow=6) \
                  | lookup asset_criticality_lookup asset_name AS src OUTPUT environment \
                  | eval risk_score=case( \
                      match(user,"svc_.*"),60, \
                      match(user,".*admin.*"),75, \
                      1=1, 65 \
                    ) \
                  | join type=left user \
                    [search `sentinel_identity_index` action=success \
                     | stats dc(src) AS src_count, values(src) AS src_ips BY user \
                     | where src_count > 1 \
                     | eval impossible_travel=1 \
                     | fields user, impossible_travel] \
                  | eval risk_score=if(impossible_travel=1, risk_score+20, risk_score) \
                  | eval alert_type="INSIDER_THREAT_OFFHOURS_ADMIN" \
                  | fields _time, user, src, dest, hour, dow, environment, \
                           impossible_travel, risk_score, alert_type
description     = Detects privileged account logins outside business hours. Score \
                  escalates to critical when impossible travel is also detected.
cron_schedule   = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time   = now
counttype       = number of events
quantity        = 0
relation        = greater than
alert.severity  = 3
alert.suppress  = 1
alert.suppress.period = 3600s
alert.suppress.fields = user,src
disabled        = 0
action.sentinel_trigger = 1
action.sentinel_trigger.param.alert_type  = INSIDER_THREAT_OFFHOURS_ADMIN
action.sentinel_trigger.param.auto_triage = true


# -----------------------------------------------------------------------------
# RULE 5: Cloud Misconfiguration — Public S3 Bucket Access
#
# Detects S3 GetObject or ListBucket API calls from unauthenticated principals
# (requestParameters.requestId absent or authType=none) against buckets that
# contain classification tags indicating sensitive data. Fires on first event;
# no suppression window due to high data breach risk.
# -----------------------------------------------------------------------------
[SENTINEL - Cloud - Public S3 Bucket Access - Rule]
search          = `sentinel_cloud_index` source="aws:cloudtrail" \
                  (eventName=GetObject OR eventName=ListBucket OR eventName=PutBucketPolicy) \
                  (userIdentity.type=Anonymous OR errorCode=NoSuchBucketPolicy) \
                  | spath input=requestParameters output=bucket_name path=bucketName \
                  | lookup asset_criticality_lookup asset_name AS bucket_name \
                    OUTPUT criticality_score, business_unit, environment \
                  | eval risk_score=case( \
                      environment="production" AND criticality_score>=1.5, 95, \
                      environment="production", 80, \
                      1=1, 60 \
                    ) \
                  | eval alert_type="CLOUD_MISCONFIG_PUBLIC_S3" \
                  | fields _time, bucket_name, eventName, sourceIPAddress, \
                           userIdentity.type, environment, business_unit, \
                           risk_score, alert_type
description     = Detects anonymous or unauthenticated access to S3 buckets, \
                  indicating public misconfiguration or active data theft.
cron_schedule   = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time   = now
counttype       = number of events
quantity        = 0
relation        = greater than
alert.severity  = 5
alert.suppress  = 0
disabled        = 0
action.sentinel_trigger = 1
action.sentinel_trigger.param.alert_type  = CLOUD_MISCONFIG_PUBLIC_S3
action.sentinel_trigger.param.auto_triage = true


# =============================================================================
# CORRELATION SEARCHES (Splunk ES Integration)
# These run as ES correlation searches and create Notable Events that feed
# into the SENTINEL triage pipeline alongside the detection rules above.
# =============================================================================

[SENTINEL - Correlation - Multi-Stage Attack Progression]
search          = index=sentinel_cases status!=CLOSED \
                  | stats dc(alert_type) AS attack_stages, \
                          values(alert_type) AS stages, \
                          max(risk_score) AS max_risk \
                    BY affected_host \
                  | where attack_stages >= 2 \
                  | eval combined_risk=min(max_risk*1.3, 100) \
                  | eval alert_type="MULTI_STAGE_ATTACK_CHAIN" \
                  | fields _time, affected_host, attack_stages, stages, combined_risk, alert_type
description     = Correlates multiple active cases against the same host to detect \
                  multi-stage attack chains. Automatically elevates priority to CRITICAL.
cron_schedule   = */5 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time   = now
counttype       = number of events
quantity        = 0
relation        = greater than
alert.severity  = 5
disabled        = 0
action.sentinel_trigger = 1
action.sentinel_trigger.param.alert_type  = MULTI_STAGE_ATTACK_CHAIN
action.sentinel_trigger.param.auto_triage = true


# =============================================================================
# REPORTING SEARCHES (War Room Dashboard + Sage)
# =============================================================================

[SENTINEL - Metrics - Weekly KPI Summary]
search          = index=sentinel_metrics earliest=-7d \
                  | stats count AS total_cases, \
                          sum(eval(resolution="CONTAINED")) AS contained, \
                          sum(eval(resolution="FALSE_POSITIVE")) AS false_positives, \
                          avg(mttr_seconds) AS avg_mttr_sec, \
                          sum(cost_savings_usd) AS total_savings_usd \
                  | eval fpr=round(false_positives/total_cases*100,1) \
                  | eval avg_mttr_min=round(avg_mttr_sec/60,1) \
                  | eval total_savings_fmt="$".tostring(round(total_savings_usd,0))
description     = Weekly KPI rollup for executive reporting and Sage benchmarking.
cron_schedule   = 0 8 * * 1
dispatch.earliest_time = -7d
dispatch.latest_time   = now
disabled        = 0

[SENTINEL - Metrics - Agent Performance Dashboard Feed]
search          = index=sentinel_audit \
                  | stats count AS decisions, \
                          avg(confidence) AS avg_confidence, \
                          avg(latency_ms) AS avg_latency_ms, \
                          sum(eval(action_outcome="SUCCESS")) AS successful_actions \
                    BY agent_name, bin(_time, span=1h) \
                  | eval success_rate=round(successful_actions/decisions*100,1)
description     = Hourly agent performance metrics powering the War Room dashboard.
cron_schedule   = 5 * * * *
dispatch.earliest_time = -65m
dispatch.latest_time   = now
disabled        = 0
