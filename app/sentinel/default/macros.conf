# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# macros.conf — Reusable SPL macros
#
# Macros abstract environment-specific values (index names, thresholds,
# account filters) so detection rules remain portable across deployments.
# Override any macro in app/sentinel/local/macros.conf without touching
# these defaults.
# =============================================================================


# =============================================================================
# INDEX MACROS
# Point to the correct data sources for each telemetry type.
# Defaults assume CIM-mapped ES data; override per your index naming scheme.
# =============================================================================

[sentinel_edr_index]
definition  = index=endpoint
iseval      = 0

[sentinel_network_index]
definition  = index=network
iseval      = 0

[sentinel_identity_index]
definition  = index=identity (sourcetype=WinEventLog:Security OR sourcetype=linux_audit OR sourcetype=okta OR sourcetype=azure:ad)
iseval      = 0

[sentinel_cloud_index]
definition  = index=cloud (sourcetype=aws:cloudtrail OR sourcetype=google:gcp:audit OR sourcetype=azure:audit)
iseval      = 0

[sentinel_firewall_index]
definition  = index=network (sourcetype=cisco:asa OR sourcetype=paloalto:firewall OR sourcetype=fortinet:firewall)
iseval      = 0

[sentinel_dns_index]
definition  = index=network (sourcetype=stream:dns OR sourcetype=bro:dns)
iseval      = 0

[sentinel_proxy_index]
definition  = index=network (sourcetype=squid OR sourcetype=bluecoat:proxysg:access:kv OR sourcetype=websense:cg:kv)
iseval      = 0


# =============================================================================
# FILTER MACROS
# Common exclusion and inclusion filters used across multiple rules.
# =============================================================================

# Traffic destined for RFC 1918 private address space (internal traffic)
[sentinel_internal_traffic]
definition  = (dest="10.*" OR dest="172.16.*" OR dest="172.17.*" OR dest="172.18.*" OR dest="172.19.*" OR dest="172.2*.*" OR dest="172.30.*" OR dest="172.31.*" OR dest="192.168.*")
iseval      = 0

# Traffic destined outside RFC 1918 (external / internet-bound)
[sentinel_external_traffic]
definition  = NOT (dest="10.*" OR dest="172.16.*" OR dest="172.17.*" OR dest="172.18.*" OR dest="172.19.*" OR dest="172.2*.*" OR dest="172.30.*" OR dest="172.31.*" OR dest="192.168.*" OR dest="127.*")
iseval      = 0

# Privileged account patterns — extend this list per your naming convention
[sentinel_privileged_accounts]
definition  = (user="*admin*" OR user="*administrator*" OR user="*svc_*" OR user="*service*" OR user="root" OR user="SYSTEM")
iseval      = 0

# Exclude known-good scanner and monitoring hosts from network detection rules
[sentinel_scanner_exclusions]
definition  = NOT (src="10.0.0.10" OR src="10.0.0.11" OR src_category="scanner" OR src_category="monitoring")
iseval      = 0

# Business hours window: Monday–Friday, 06:00–22:00 local time
[sentinel_business_hours]
definition  = (strftime(_time,"%w")>=1 AND strftime(_time,"%w")<=5) AND (strftime(_time,"%H")>=6 AND strftime(_time,"%H")<22)
iseval      = 0

[sentinel_off_hours]
definition  = NOT (strftime(_time,"%w")>=1 AND strftime(_time,"%w")<=5 AND strftime(_time,"%H")>=6 AND strftime(_time,"%H")<22)
iseval      = 0


# =============================================================================
# THRESHOLD MACROS
# Tune these in local/macros.conf without touching detection rule SPL.
# =============================================================================

# Minimum bytes_out in a 10-minute window to trigger the exfiltration rule
[sentinel_exfil_bytes_threshold]
definition  = 104857600
iseval      = 0

# Minimum number of failed logins before brute-force detection fires
[sentinel_brute_force_threshold]
definition  = 10
iseval      = 0

# Minimum number of unique destination ports to flag a port scan
[sentinel_portscan_threshold]
definition  = 50
iseval      = 0

# Vanguard risk score above which Sherlock is auto-invoked
[sentinel_escalation_threshold]
definition  = 85
iseval      = 0

# Vanguard risk score below which a case is auto-closed as low confidence
[sentinel_auto_close_threshold]
definition  = 40
iseval      = 0

# Risk score above which Executor acts without human approval
[sentinel_auto_respond_threshold]
definition  = 90
iseval      = 0


# =============================================================================
# CASE MANAGEMENT MACROS
# SPL fragments reused across multiple searches against sentinel_* indexes.
# =============================================================================

# Fetch the current state of all active cases
[sentinel_active_cases]
definition  = index=sentinel_cases status!=CLOSED status!=SUPPRESSED | dedup case_id sortby -_time
iseval      = 0

# Fetch the full audit trail for a specific case (pass case_id as argument)
[sentinel_case_audit(1)]
args        = case_id
definition  = index=sentinel_audit case_id="$case_id$" | sort _time
iseval      = 0

# Fetch the latest agent decision for a given case
[sentinel_latest_decision(1)]
args        = case_id
definition  = index=sentinel_audit case_id="$case_id$" sourcetype=sentinel:agent:decision | dedup case_id,agent_name sortby -_time
iseval      = 0

# Summarise MTTR for a date range (pass earliest/latest via dispatch)
[sentinel_mttr_summary]
definition  = index=sentinel_metrics resolution=CONTAINED | eval mttr_min=round((closed_time-created_time)/60,1) | stats avg(mttr_min) AS avg_mttr_min, min(mttr_min) AS min_mttr_min, max(mttr_min) AS max_mttr_min, count AS total_contained
iseval      = 0

# Risk score severity label lookup
[sentinel_severity_label(1)]
args        = score_field
definition  = eval severity_label=case($score_field$>=90,"CRITICAL",$score_field$>=75,"HIGH",$score_field$>=50,"MEDIUM",$score_field$>=25,"LOW",1=1,"INFO")
iseval      = 0


# =============================================================================
# THREAT INTELLIGENCE MACROS
# =============================================================================

# Check if an IP is in the IOC whitelist (returns 1 if whitelisted)
[sentinel_is_whitelisted_ip(1)]
args        = ip_field
definition  = lookup ioc_whitelist_lookup ioc_type AS "ip" ioc_value AS $ip_field$ OUTPUT ioc_value AS _wl_match | eval is_whitelisted=if(isnotnull(_wl_match),1,0)
iseval      = 0

# Enrich a field with asset criticality data
[sentinel_enrich_asset(1)]
args        = host_field
definition  = lookup asset_criticality_lookup asset_name AS $host_field$ OUTPUT criticality_score, criticality_label, owner, environment, business_unit
iseval      = 0

# Enrich MITRE tactic with threat actor context
[sentinel_enrich_mitre(1)]
args        = tactic_field
definition  = lookup threat_actor_ttp_lookup tactic_id AS $tactic_field$ OUTPUT threat_actor, campaign, severity_modifier, recommended_playbook
iseval      = 0
