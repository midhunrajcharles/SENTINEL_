# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# collections.conf — KV Store collection definitions
#
# KV Store provides the persistent shared memory layer between all four agents
# and the orchestrator. Collections here act as the "working memory" of the
# pipeline; the sentinel_* indexes serve as the immutable historical record.
#
# Field types use Splunk's supported KV Store type annotations:
#   string, number, bool, time, array, cidr
# =============================================================================

# -----------------------------------------------------------------------------
# agent_state
# Real-time status record for each of the four agents + orchestrator.
# Written by each agent on startup, task start, task end, and shutdown.
# Read by the War Room dashboard agent health panel every 30 seconds.
#
# Key: agent_name (one of: orchestrator, vanguard, sherlock, executor, sage)
# -----------------------------------------------------------------------------
[agent_state]
field.agent_name            = string
field.status                = string
field.current_case_id       = string
field.last_heartbeat        = time
field.last_case_completed   = time
field.cases_processed_total = number
field.cases_active          = number
field.avg_latency_ms        = number
field.error_count           = number
field.last_error            = string
field.version               = string
accelerated_fields.agent_name = 1

# -----------------------------------------------------------------------------
# case_queue
# Pending cases waiting to enter the triage pipeline. Written by the
# sentinel_trigger alert action; drained by the orchestrator on each poll.
# Cases are removed from the queue once the orchestrator acknowledges them
# and writes the initial record to the sentinel_cases index.
#
# Key: queue_id (UUID generated by sentinel_trigger)
# -----------------------------------------------------------------------------
[case_queue]
field.queue_id          = string
field.alert_id          = string
field.alert_type        = string
field.alert_name        = string
field.source_index      = string
field.source_host       = string
field.source_user       = string
field.raw_risk_score    = number
field.priority_override = string
field.queued_time       = time
field.retry_count       = number
field.status            = string
accelerated_fields.queue_id    = 1
accelerated_fields.status      = 1
accelerated_fields.queued_time = 1

# -----------------------------------------------------------------------------
# active_cases
# Live case state for every open investigation. Replaces in-memory state
# across agent restarts; the authoritative record for the current pipeline
# position of each case.
#
# Key: case_id (format: SEN-NNNNNN)
# -----------------------------------------------------------------------------
[active_cases]
field.case_id               = string
field.alert_id              = string
field.alert_type            = string
field.status                = string
field.priority              = string
field.affected_host         = string
field.affected_user         = string
field.risk_score            = number
field.classification        = string
field.mitre_tactic          = string
field.mitre_technique       = string
field.assigned_agent        = string
field.vanguard_decision     = string
field.sherlock_report       = string
field.executor_actions      = string
field.created_time          = time
field.updated_time          = time
field.sla_deadline          = time
field.requires_approval     = bool
field.approval_granted_by   = string
field.approval_granted_time = time
accelerated_fields.case_id       = 1
accelerated_fields.status        = 1
accelerated_fields.affected_host = 1
accelerated_fields.risk_score    = 1

# -----------------------------------------------------------------------------
# threat_intel_cache
# Short-lived cache of threat intelligence lookups to avoid redundant
# VirusTotal / MISP API calls for the same IOC within a TTL window.
# TTL is enforced in Python (threat_intel_enricher.py); stale entries
# are pruned on each cache access.
#
# Key: ioc_value
# -----------------------------------------------------------------------------
[threat_intel_cache]
field.ioc_value             = string
field.ioc_type              = string
field.vt_score              = number
field.vt_detections         = number
field.vt_total_engines      = number
field.vt_malware_families   = string
field.misp_event_ids        = string
field.misp_tags             = string
field.first_seen            = time
field.last_seen             = time
field.is_whitelisted        = bool
field.cache_time            = time
field.ttl_seconds           = number
accelerated_fields.ioc_value  = 1
accelerated_fields.ioc_type   = 1
accelerated_fields.cache_time = 1

# -----------------------------------------------------------------------------
# response_locks
# Distributed locking table to prevent race conditions when multiple agent
# instances attempt to act on the same target simultaneously. Executor
# acquires a lock before executing any containment action; releases it after
# verification or rollback.
#
# Key: lock_id (target + action_type composite)
# -----------------------------------------------------------------------------
[response_locks]
field.lock_id           = string
field.case_id           = string
field.action_type       = string
field.target            = string
field.acquired_by       = string
field.acquired_time     = time
field.expiry_time       = time
field.released          = bool
accelerated_fields.lock_id    = 1
accelerated_fields.released   = 1
accelerated_fields.expiry_time = 1

# -----------------------------------------------------------------------------
# detection_proposals
# Sage's proposed detection rule improvements awaiting analyst review.
# Written by agent_sage.py after backtesting; reviewed in the War Room.
#
# Key: proposal_id (UUID)
# -----------------------------------------------------------------------------
[detection_proposals]
field.proposal_id           = string
field.source_case_id        = string
field.rule_name             = string
field.rule_spl              = string
field.description           = string
field.backtest_tp           = number
field.backtest_fp           = number
field.backtest_window_days  = number
field.estimated_fpr_pct     = number
field.status                = string
field.proposed_time         = time
field.reviewed_by           = string
field.reviewed_time         = time
field.deployed_time         = time
accelerated_fields.proposal_id = 1
accelerated_fields.status      = 1
