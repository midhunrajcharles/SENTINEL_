# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# transforms.conf — Field extractions and lookup definitions
#
# Regex extractions target the JSON envelope fields that AUTO_KV_JSON does
# not capture cleanly (nested objects, arrays, compound values).
# Lookup definitions wire the CSV files in lookups/ into SPL.
# =============================================================================

# =============================================================================
# REGEX FIELD EXTRACTIONS
# Referenced by REPORT- stanzas in props.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Case ID — matches SEN-NNNNNN format embedded anywhere in a JSON string
# -----------------------------------------------------------------------------
[extract_case_id]
SOURCE_KEY = _raw
REGEX      = "case_id"\s*:\s*"(?P<case_id>SEN-\d{6,})"
FORMAT     = case_id::$1

# -----------------------------------------------------------------------------
# Agent name — one of the four canonical agent identifiers
# -----------------------------------------------------------------------------
[extract_agent_name]
SOURCE_KEY = _raw
REGEX      = "agent_name"\s*:\s*"(?P<agent_name>vanguard|sherlock|executor|sage|orchestrator)"
FORMAT     = agent_name::$1

# -----------------------------------------------------------------------------
# Decision fields — captures decision_type and numeric confidence
# -----------------------------------------------------------------------------
[extract_decision_fields]
SOURCE_KEY = _raw
REGEX      = "decision_type"\s*:\s*"(?P<decision_type>[A-Z_]+)"[^}]*"confidence"\s*:\s*(?P<confidence>\d+(?:\.\d+)?)
FORMAT     = decision_type::$1 confidence::$2

# -----------------------------------------------------------------------------
# Action fields — captures action name, target, and outcome
# -----------------------------------------------------------------------------
[extract_action_fields]
SOURCE_KEY = _raw
REGEX      = "action_taken"\s*:\s*"(?P<action_taken>[a-z_]+)"[^}]*"target"\s*:\s*"(?P<action_target>[^"]+)"[^}]*"outcome"\s*:\s*"(?P<action_outcome>SUCCESS|FAILURE|PENDING|ROLLED_BACK)"
FORMAT     = action_taken::$1 action_target::$2 action_outcome::$3

# -----------------------------------------------------------------------------
# MITRE ATT&CK fields — tactic ID and technique ID
# -----------------------------------------------------------------------------
[extract_mitre_fields]
SOURCE_KEY = _raw
REGEX      = "mitre_tactic"\s*:\s*"(?P<mitre_tactic>TA\d{4})"[^}]*"mitre_technique"\s*:\s*"(?P<mitre_technique>T\d{4}(?:\.\d{3})?)"
FORMAT     = mitre_tactic::$1 mitre_technique::$2

# -----------------------------------------------------------------------------
# Case status — lifecycle state machine values
# -----------------------------------------------------------------------------
[extract_case_status]
SOURCE_KEY = _raw
REGEX      = "status"\s*:\s*"(?P<case_status>QUEUED|TRIAGING|INVESTIGATING|DECIDING|RESPONDING|LEARNING|CLOSED|ESCALATED|SUPPRESSED)"
FORMAT     = case_status::$1

# -----------------------------------------------------------------------------
# Case priority — maps to ES severity levels
# -----------------------------------------------------------------------------
[extract_case_priority]
SOURCE_KEY = _raw
REGEX      = "priority"\s*:\s*"(?P<case_priority>CRITICAL|HIGH|MEDIUM|LOW|INFO)"
FORMAT     = case_priority::$1

# -----------------------------------------------------------------------------
# Confidence band — buckets raw float confidence into human-readable tiers
# Used in the War Room dashboard color coding
# -----------------------------------------------------------------------------
[extract_confidence_band]
SOURCE_KEY = _raw
REGEX      = "confidence"\s*:\s*(?P<confidence_raw>0?\.\d+|1\.0)
FORMAT     = confidence_raw::$1

# =============================================================================
# LOOKUP DEFINITIONS
# Wire lookup CSV files into SPL for use in searches and correlation rules
# =============================================================================

# -----------------------------------------------------------------------------
# Asset criticality — maps hostname/IP to business criticality multiplier
# Columns: asset_id, asset_name, ip_address, criticality_score,
#          criticality_label, owner, environment, business_unit
# -----------------------------------------------------------------------------
[asset_criticality_lookup]
filename       = asset_criticality.csv
default_match  = true
match_type     = WILDCARD(asset_name)
max_matches    = 1

# -----------------------------------------------------------------------------
# Threat actor TTP mapping — MITRE ATT&CK tactic/technique to known groups
# Columns: tactic_id, technique_id, technique_name, threat_actor,
#          campaign, severity_modifier, recommended_playbook
# -----------------------------------------------------------------------------
[threat_actor_ttp_lookup]
filename      = threat_actor_ttp.csv
default_match = false
max_matches   = 5

# -----------------------------------------------------------------------------
# SAIA cached queries — fallback NL->SPL templates when the Splunk AI
# Assistant endpoint is unavailable or not yet configured (see _SAIAClient
# in saia_client.py). Matched on alert_type + phase.
# Columns: cache_key, alert_type, phase, question_pattern, spl_template,
#          description
# -----------------------------------------------------------------------------
[saia_cached_queries_lookup]
filename      = saia_cached_queries.csv
default_match = false
max_matches    = 5

# -----------------------------------------------------------------------------
# Response playbooks — maps classification + priority to action sequence
# Columns: classification, priority, action_sequence, requires_approval,
#          rollback_timer_hours, notification_tier
# -----------------------------------------------------------------------------
[response_playbooks_lookup]
filename      = response_playbooks.csv
default_match = true
max_matches   = 1

# -----------------------------------------------------------------------------
# IOC whitelist — known-good indicators to suppress false positives
# Columns: ioc_type, ioc_value, reason, owner, expiry_date
# -----------------------------------------------------------------------------
[ioc_whitelist_lookup]
filename      = ioc_whitelist.csv
default_match = false
match_type    = WILDCARD(ioc_value)
max_matches   = 1

# =============================================================================
# METRIC TRANSFORMS
# Used by savedsearches for KPI aggregation
# =============================================================================

# Maps numeric risk score to a display-friendly severity label
[risk_score_to_severity]
SOURCE_KEY    = risk_score
REGEX         = ^(?P<_KEY_1>\d+)$
FORMAT        = severity::$1
CLEAN_KEYS    = false
