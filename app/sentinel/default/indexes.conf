# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# indexes.conf — Custom index definitions
#
# All SENTINEL indexes use a shared homePath root under $SPLUNK_DB/sentinel/.
# Retention periods are conservative defaults; adjust to your storage capacity.
# Do NOT store raw security event data here — use ES indexes for that.
# =============================================================================

# -----------------------------------------------------------------------------
# sentinel_audit
# Immutable audit trail for every agent decision, action, and state transition.
# Written by audit_logger.py; never modified after ingestion.
# Retention: 365 days (compliance requirement for incident audit trails).
# -----------------------------------------------------------------------------
[sentinel_audit]
homePath   = $SPLUNK_DB/sentinel/audit/db
coldPath   = $SPLUNK_DB/sentinel/audit/colddb
thawedPath = $SPLUNK_DB/sentinel/audit/thaweddb
frozenTimePeriodInSecs = 31536000
maxDataSize            = auto_high_volume
maxHotBuckets          = 4
maxWarmDBCount         = 100
repFactor              = auto

# Prevent any process from deleting or modifying events
# (requires index-time enforcement at the Splunk level)
isInternal = false

# -----------------------------------------------------------------------------
# sentinel_cases
# Persistent case state for active and closed investigations.
# Written by state_manager.py; updated throughout the agent pipeline.
# Retention: 180 days (operational; historical cases move to cold storage).
# -----------------------------------------------------------------------------
[sentinel_cases]
homePath   = $SPLUNK_DB/sentinel/cases/db
coldPath   = $SPLUNK_DB/sentinel/cases/colddb
thawedPath = $SPLUNK_DB/sentinel/cases/thaweddb
frozenTimePeriodInSecs = 15552000
maxDataSize            = auto
maxHotBuckets          = 3
maxWarmDBCount         = 50
repFactor              = auto

# -----------------------------------------------------------------------------
# sentinel_metrics
# Agent performance KPIs: MTTR, false positive rate, actions per case,
# model confidence distributions, cost savings estimates.
# Written by each agent upon case closure; read by Sage and the War Room.
# Retention: 730 days (year-over-year trend analysis).
# -----------------------------------------------------------------------------
[sentinel_metrics]
homePath   = $SPLUNK_DB/sentinel/metrics/db
coldPath   = $SPLUNK_DB/sentinel/metrics/colddb
thawedPath = $SPLUNK_DB/sentinel/metrics/thaweddb
frozenTimePeriodInSecs = 63072000
maxDataSize            = auto
maxHotBuckets          = 2
maxWarmDBCount         = 24
repFactor              = auto

# -----------------------------------------------------------------------------
# sentinel_learning
# Sage's training corpus: historical case outcomes, detection rule performance,
# baseline shift records, and threat intel harvest results.
# Written exclusively by agent_sage.py.
# Retention: 730 days (two-year detection drift window).
# -----------------------------------------------------------------------------
[sentinel_learning]
homePath   = $SPLUNK_DB/sentinel/learning/db
coldPath   = $SPLUNK_DB/sentinel/learning/colddb
thawedPath = $SPLUNK_DB/sentinel/learning/thaweddb
frozenTimePeriodInSecs = 63072000
maxDataSize            = auto
maxHotBuckets          = 2
maxWarmDBCount         = 24
repFactor              = auto
