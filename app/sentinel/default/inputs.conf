# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# inputs.conf — Scripted inputs for agent orchestration
#
# The orchestrator runs on a 60-second polling interval. It checks the
# sentinel_cases KV Store for pending alerts passed in by the alert action,
# then dispatches them to the appropriate agent pipeline.
#
# Note: The orchestrator does NOT ingest raw log data. All raw data flows
# through standard ES inputs. The scripted input here is the agent heartbeat.
# =============================================================================

# -----------------------------------------------------------------------------
# Primary orchestrator heartbeat
# Runs every 60 seconds to drain the case_queue KV Store collection.
# Disabled by default; enable after completing sentinel.conf configuration.
# -----------------------------------------------------------------------------
[script://./bin/sentinel_orchestrator.py]
interval    = 60
sourcetype  = sentinel:orchestrator
index       = sentinel_audit
source      = sentinel_orchestrator
disabled    = 0
passAuth    = $decrypted_password$

# Prevent multiple instances from running concurrently
# (orchestrator acquires a distributed lock via KV Store on startup)

# -----------------------------------------------------------------------------
# Agent health monitor
# Polls agent status from KV Store and emits heartbeat events for the
# War Room dashboard. Lightweight — no agent logic executed here.
# -----------------------------------------------------------------------------
[script://./bin/utils/state_manager.py --mode=heartbeat]
interval   = 30
sourcetype = sentinel:agent:heartbeat
index      = sentinel_metrics
source     = agent_health_monitor
disabled   = 0

# -----------------------------------------------------------------------------
# Sage learning sweep
# Runs once per hour to process closed cases and update detection rules.
# Separate from the main orchestrator to avoid blocking alert processing.
# -----------------------------------------------------------------------------
[script://./bin/agent_sage.py --mode=sweep]
interval   = 3600
sourcetype = sentinel:sage:sweep
index      = sentinel_learning
source     = sage_learning_sweep
disabled   = 0
