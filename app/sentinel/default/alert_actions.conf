# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# alert_actions.conf — Custom alert action definitions
#
# sentinel_trigger is the bridge between Splunk ES correlation searches and
# the SENTINEL agent pipeline. When a detection rule fires, this action
# serializes the alert result, writes it to the case_queue KV Store
# collection, and optionally calls the orchestrator REST endpoint directly
# for near-real-time response (sub-60s vs. the 60s scripted input interval).
# =============================================================================

[sentinel_trigger]
# Human-readable label shown in the Splunk UI alert action picker
label               = SENTINEL Trigger

# Short description shown in the alert action configuration panel
description         = Submit this alert to the SENTINEL autonomous triage pipeline. \
                      Vanguard Agent will classify and route the case within 60 seconds.

# Icon displayed next to the action in the Splunk UI
icon_path           = sentinel_trigger_icon.png

# Alert action is available globally across all apps
is_custom           = 1
is_stateful         = 0

# Payload format sent to the alert action script
payload_format      = json

# Python script that implements the action (in bin/)
filename            = alert_sentinel_trigger.py

# Whether this action supports adaptive response (ES integration)
supports_adhoc      = 1

# =============================================================================
# DEFAULT PARAMETER VALUES
# All params can be overridden per-alert in savedsearches.conf via
# action.sentinel_trigger.param.<name> = <value>
# =============================================================================

param.alert_type        = UNKNOWN
param.auto_triage       = true
param.priority_override =
param.notify_oncall     = false

# Maximum time in seconds the action script is allowed to run before Splunk
# kills it. Set high enough to allow KV Store write + REST call to complete.
param.timeout           = 30

# If true, the action will POST directly to the orchestrator REST endpoint
# in addition to writing to the KV Store queue. Requires orchestrator to be
# running and web.conf REST endpoint to be active.
param.direct_invoke     = true
param.orchestrator_url  = https://localhost:8089/servicesNS/nobody/sentinel/sentinel/orchestrate

# Suppress duplicate triggers for the same host+alert_type within this window
param.dedup_window_seconds = 300

# =============================================================================
# NOTIFICATION ACTIONS
# Secondary actions that fire alongside sentinel_trigger for high-severity
# alerts. These supplement but do not replace the agent pipeline.
# =============================================================================

[sentinel_notify_oncall]
label               = SENTINEL On-Call Notification
description         = Send an immediate Slack/PagerDuty notification for CRITICAL \
                      severity alerts. Runs in parallel with sentinel_trigger.
is_custom           = 1
filename            = alert_sentinel_notify.py
param.channel       = #soc-oncall
param.severity_min  = CRITICAL
param.timeout       = 15

[sentinel_create_ticket]
label               = SENTINEL Ticket Creation
description         = Pre-create a P1 ServiceNow incident before the Executor agent \
                      takes action. Used as a fallback if ServiceNow API is unavailable \
                      during automated response.
is_custom           = 1
filename            = alert_sentinel_ticket.py
param.assignment_group = Security Operations
param.category         = Security Incident
param.priority         = 1
param.timeout          = 20
