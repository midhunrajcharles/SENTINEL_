# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# mcp_server.conf — Splunk MCP Server configuration
#
# This file configures the MCP Server that acts as the tool execution layer
# for all four SENTINEL agents. Agents communicate with this server via the
# MCP protocol; the server translates tool calls into Splunk REST API calls,
# KV Store operations, and external API requests.
#
# Copy this file to mcp_server/config/mcp_server.local.conf and populate
# the [REDACTED] fields before starting the server. Never commit the local
# file to source control.
# =============================================================================


# =============================================================================
# [server] — HTTP server binding and transport configuration
# =============================================================================
[server]
# Host interface to bind the MCP HTTP server to.
# Use 0.0.0.0 only in isolated lab environments; restrict to localhost or a
# specific management NIC in production.
host            = 127.0.0.1
port            = 3000
protocol        = https

# TLS certificate paths (required when protocol = https)
# Generate a self-signed cert for dev: openssl req -x509 -newkey rsa:4096
#   -keyout key.pem -out cert.pem -days 365 -nodes
tls_cert_path   = ./certs/mcp_server.crt
tls_key_path    = ./certs/mcp_server.key

# Maximum concurrent MCP sessions (one per agent + one for the War Room)
max_connections = 10

# Keep-alive timeout in seconds
keepalive_timeout = 60

# Request body size limit (bytes) — prevents oversized SPL injection payloads
max_body_bytes  = 1048576

# Health check endpoint path (unauthenticated, used by inputs.conf heartbeat)
health_endpoint = /health

# Tool discovery endpoint path
tools_endpoint  = /tools


# =============================================================================
# [splunk] — Splunk REST API connection settings
# =============================================================================
[splunk]
# Splunk management endpoint (REST API)
host            = localhost
port            = 8089
protocol        = https

# Service account used by the MCP Server to execute searches and KV Store ops.
# This account requires the following Splunk roles:
#   - sentinel_agent (custom role defined in authorize.conf)
#   - can_delete (for KV Store cleanup)
# DO NOT use admin — use the principle of least privilege.
username        = sentinel_service
# Token stored in auth_tokens.conf [splunk] section
token_ref       = splunk.api_token

# SSL verification for Splunk REST API
# Set to true in production; false acceptable for dev with self-signed certs
verify_ssl      = false

# Connection pool size for concurrent Splunk REST calls across agents
connection_pool_size = 8

# Default search timeout in seconds (agents can override per-call)
search_timeout_default  = 120
search_timeout_max      = 600

# Maximum number of results returned by search_spl tool
# Agents should page through large result sets rather than increasing this
search_results_max      = 10000

# SPL job dispatch parameters
dispatch_earliest_default = -24h
dispatch_latest_default   = now


# =============================================================================
# [auth] — MCP Server authentication configuration
# =============================================================================
[auth]
# Authentication mode for MCP client connections.
# Options: bearer_token | mutual_tls | none (dev only — never use in prod)
mode            = bearer_token

# Bearer token for SENTINEL agents to authenticate to the MCP Server.
# Must match the token configured in each agent's local config.
# Generate with: python -c "import secrets; print(secrets.token_urlsafe(48))"
# Token stored in auth_tokens.conf [mcp_server] section
agent_token_ref = mcp_server.agent_token

# Separate read-only token for War Room dashboard / external monitoring
readonly_token_ref = mcp_server.readonly_token

# Token lifetime in seconds (0 = non-expiring static tokens)
token_ttl       = 0

# IP allowlist for MCP client connections (CIDR notation, comma-separated)
# Restricts which hosts can connect to the MCP Server at all.
# Default: localhost only. Expand carefully.
allowed_ips     = 127.0.0.1/32

# Require TLS client certificate in addition to bearer token (defense in depth)
require_client_cert = false


# =============================================================================
# [rate_limiting] — Per-tool and global rate limit configuration
# =============================================================================
[rate_limiting]
# Master switch — disable only for load testing
enabled         = true

# Global request rate across all clients and tools
global_rps_max          = 100
global_burst_max        = 200

# Per-agent rate limits (matched by bearer token identity)
per_agent_rps_max       = 20
per_agent_burst_max     = 40

# Per-tool overrides (tool-specific limits take precedence over per-agent)
# SPL search is the most expensive operation — throttle hard
tool.search_spl.rps_max         = 5
tool.search_spl.burst_max       = 10
tool.run_saved_search.rps_max   = 10
tool.run_saved_search.burst_max = 20

# Response actions are irreversible — intentionally low rate limit
tool.execute_response_action.rps_max    = 2
tool.execute_response_action.burst_max  = 4

# Threat intel enrichment is rate-limited by upstream API quotas
tool.enrich_threat_intel.rps_max        = 3
tool.enrich_threat_intel.burst_max      = 5

# Lightweight read operations have higher limits
tool.get_indexes.rps_max            = 30
tool.get_asset_context.rps_max      = 20
tool.get_knowledge_objects.rps_max  = 10

# Rate limit response: 429 with Retry-After header
rate_limit_status_code  = 429
rate_limit_retry_after  = 5


# =============================================================================
# [logging] — Server and tool call logging
# =============================================================================
[logging]
# Log level: DEBUG | INFO | WARNING | ERROR | CRITICAL
level           = INFO

# Log format: json (structured, recommended for Splunk ingestion)
#             text (human-readable for dev)
format          = json

# Log output: file | stdout | both
output          = both

# Log file path (relative to mcp_server/ directory)
file_path       = ./logs/mcp_server.log

# Log rotation
max_file_size_mb    = 100
backup_count        = 10

# Log every tool call with input/output (WARNING: may log sensitive data)
# Set to false in production if inputs contain PII or credentials
log_tool_calls      = true
log_tool_inputs     = true
log_tool_outputs    = false

# Emit a structured audit event to sentinel_audit index for every tool call
# that modifies state (execute_response_action, create_ticket, notify_*)
audit_mutating_calls = true
audit_splunk_index   = sentinel_audit
audit_sourcetype     = sentinel:mcp:audit


# =============================================================================
# [tool_registry] — Where to load tool definitions from
# =============================================================================
[tool_registry]
# Load tool definitions from the custom_tools/ YAML files at startup
# The server hot-reloads these files if they change on disk (no restart needed)
custom_tools_path   = ../custom_tools/

# Also load the compiled tool_definitions.json schema registry
schema_registry     = ./tool_definitions.json

# Validate all tool schemas at startup against JSON Schema draft-07
validate_schemas    = true

# Maximum tool execution time in seconds before the server returns a timeout
# error to the calling agent. Agents should implement their own retry logic.
tool_timeout_default    = 30
tool_timeout_max        = 120


# =============================================================================
# [cache] — Response caching configuration
# =============================================================================
[cache]
# Enable in-memory LRU cache for idempotent tool calls
enabled         = true
max_entries     = 500
default_ttl_seconds = 30

# Per-tool cache TTL overrides
tool.get_indexes.ttl_seconds            = 300
tool.get_knowledge_objects.ttl_seconds  = 600
tool.get_asset_context.ttl_seconds      = 120
tool.validate_spl.ttl_seconds           = 3600
tool.enrich_threat_intel.ttl_seconds    = 86400

# Never cache mutating tool calls
tool.search_spl.ttl_seconds             = 0
tool.execute_response_action.ttl_seconds = 0
tool.create_ticket.ttl_seconds          = 0
