# =============================================================================
# SENTINEL: Autonomous Agentic SOC Commander
# auth_tokens.conf — API credential store template
#
# SECURITY NOTICE:
#   This file is a TEMPLATE. Do not put real credentials here.
#   Copy this file to auth_tokens.local.conf, populate the values,
#   and ensure auth_tokens.local.conf is in .gitignore.
#
#   For production deployments, use Splunk's built-in credential manager:
#     $SPLUNK_HOME/bin/splunk encrypt-string <value>
#   and reference the encrypted value here. The MCP Server's crypto_utils
#   module will decrypt values prefixed with $encrypted$.
#
#   Minimum file permissions: chmod 600 auth_tokens.local.conf
#   Owner: the OS user running the Splunk/MCP Server process only.
# =============================================================================


# =============================================================================
# [mcp_server] — Tokens for MCP Server authentication
# =============================================================================
[mcp_server]
# Bearer token that SENTINEL agents use to authenticate to the MCP Server.
# Must be a cryptographically random 64+ character string.
# Generate: python -c "import secrets; print(secrets.token_urlsafe(48))"
agent_token     = [REDACTED]

# Read-only token for War Room dashboard and external monitoring integrations
readonly_token  = [REDACTED]


# =============================================================================
# [splunk] — Splunk REST API credentials
# =============================================================================
[splunk]
# API token for the sentinel_service Splunk account.
# Create in Splunk Web: Settings → Tokens → New Token
# Token scope: search, kvstore_read, kvstore_write, rest_apps_management
api_token       = [REDACTED]

# Fallback basic auth credentials (used if token auth is unavailable)
# Comment these out once token auth is confirmed working
username        = sentinel_service
password        = [REDACTED]


# =============================================================================
# [virustotal] — VirusTotal API credentials
# Obtain a free API key at: https://www.virustotal.com/gui/join-us
# Free tier: 4 lookups/min, 500 lookups/day
# Premium required for full file behavior reports and retrohunting
# =============================================================================
[virustotal]
api_key         = [REDACTED]
# API version to use (v3 recommended)
api_version     = v3
# Paid tier enables private scanning (files not shared with the community)
is_premium      = false


# =============================================================================
# [misp] — MISP Threat Intelligence Platform
# Your organization's internal MISP instance or a community feed.
# =============================================================================
[misp]
# Base URL of your MISP instance
base_url        = https://misp.your-org.internal
# MISP automation key (Profile → Auth keys → Add auth key)
auth_key        = [REDACTED]
# Whether to verify the MISP server's TLS certificate
verify_ssl      = true


# =============================================================================
# [abuseipdb] — AbuseIPDB IP reputation service
# Free tier: 1,000 lookups/day
# Obtain key at: https://www.abuseipdb.com/register
# =============================================================================
[abuseipdb]
api_key         = [REDACTED]


# =============================================================================
# [servicenow] — ServiceNow ITSM integration
# Used by Executor agent to create and update incident tickets.
# Requires a ServiceNow instance with the Incident Management module.
# =============================================================================
[servicenow]
# Your ServiceNow instance subdomain (e.g., "yourcompany" for yourcompany.service-now.com)
instance        = [REDACTED]
# ServiceNow user with itil role (minimum) for incident creation
username        = sentinel_integration
password        = [REDACTED]
# Optionally use OAuth client credentials instead of basic auth
oauth_client_id     = [REDACTED]
oauth_client_secret = [REDACTED]
# Use oauth | basic — comment out whichever you are not using
auth_mode       = basic


# =============================================================================
# [slack] — Slack notification integration
# Used by Executor and the on-call notification alert action.
# Create a Slack App with chat:write and channels:read permissions.
# =============================================================================
[slack]
# OAuth Bot Token (starts with xoxb-)
bot_token       = [REDACTED]
# Default channel for SOC alerts (can be overridden per-action)
default_channel = #soc-oncall
# Signing secret for verifying Slack API request signatures
signing_secret  = [REDACTED]


# =============================================================================
# [pagerduty] — PagerDuty on-call escalation
# Used as a fallback notification channel when Slack is unavailable.
# =============================================================================
[pagerduty]
# Integration key for the SENTINEL service (Events API v2)
integration_key = [REDACTED]
# Subdomain for the PagerDuty REST API
subdomain       = [REDACTED]


# =============================================================================
# [edr] — Endpoint Detection & Response platform API
# Configure for your EDR platform. Uncomment the relevant section.
# =============================================================================

# --- CrowdStrike Falcon ---
[edr_crowdstrike]
client_id       = [REDACTED]
client_secret   = [REDACTED]
# Falcon API base URL (region-specific — check your CID settings)
base_url        = https://api.crowdstrike.com
member_cid      = [REDACTED]

# --- Microsoft Defender for Endpoint ---
[edr_defender]
tenant_id       = [REDACTED]
client_id       = [REDACTED]
client_secret   = [REDACTED]
# Required API permissions: Machine.Isolate, Machine.RestrictExecution
graph_endpoint  = https://graph.microsoft.com/v1.0

# --- SentinelOne ---
[edr_sentinelone]
api_token       = [REDACTED]
base_url        = https://your-mgmt.sentinelone.net


# =============================================================================
# [firewall] — Firewall and network control plane APIs
# =============================================================================

# --- Palo Alto Networks PAN-OS ---
[firewall_panos]
host            = [REDACTED]
api_key         = [REDACTED]
vsys            = vsys1

# --- Cisco FMC (Firepower Management Center) ---
[firewall_cisco_fmc]
host            = [REDACTED]
username        = [REDACTED]
password        = [REDACTED]
domain_uuid     = [REDACTED]


# =============================================================================
# [identity] — Identity provider APIs for account disablement
# =============================================================================

# --- Microsoft Active Directory / Azure AD ---
[identity_azuread]
tenant_id       = [REDACTED]
client_id       = [REDACTED]
client_secret   = [REDACTED]
# Required permissions: User.ReadWrite.All, Directory.ReadWrite.All

# --- Okta ---
[identity_okta]
domain          = [REDACTED].okta.com
api_token       = [REDACTED]


# =============================================================================
# [aws] — AWS API credentials for cloud response actions
# Used for S3 bucket policy remediation, security group updates, etc.
# Prefer IAM roles over long-lived access keys whenever possible.
# =============================================================================
[aws]
access_key_id       = [REDACTED]
secret_access_key   = [REDACTED]
# AWS region where response actions execute (e.g., us-east-1)
region              = [REDACTED]
# IAM role ARN to assume for cross-account response actions (optional)
assume_role_arn     = [REDACTED]
