[pytest]
# ---------------------------------------------------------------------------
# SENTINEL test suite configuration
# Reference this file explicitly: pytest -c ci/pytest.ini ...
# ---------------------------------------------------------------------------

# Test discovery roots (relative to repo root when invoked from there)
testpaths =
    tests/unit
    tests/integration
    tests/fixtures

# File patterns to collect
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# ---------------------------------------------------------------------------
# Output and reporting
# ---------------------------------------------------------------------------

# JUnit XML — consumed by GitHub Actions test reporter and CI dashboards
junit_xml = ci/reports/junit.xml
junit_suite_name = SENTINEL

# Default verbosity: show each test name and status
addopts =
    --verbose
    --tb=short
    --strict-markers
    --color=yes
    --junit-xml=ci/reports/junit.xml
    --cov=app/sentinel/bin
    --cov-report=xml:ci/reports/coverage.xml
    --cov-report=term-missing:skip-covered
    --cov-fail-under=80
    --no-header

# ---------------------------------------------------------------------------
# Markers
# ---------------------------------------------------------------------------
# All markers must be declared here; --strict-markers enforces this.

markers =
    unit:        Fast, isolated unit tests — no live Splunk, no HTTP calls (deselect with -m "not unit")
    integration: Tests requiring a live Splunk + MCP Server instance (skipped unless SENTINEL_RUN_INTEGRATION=1)
    slow:        Tests that take > 10 seconds to run (deselect with -m "not slow")
    demo:        Tests that exercise full end-to-end demo scenarios (deselect with -m "not demo")

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
# Source paths measured — must match --cov arg above
[coverage:run]
source =
    app/sentinel/bin

omit =
    # Test infrastructure
    tests/*
    # Demo scenarios
    demo/*
    # Splunk-generated files that are not agent logic
    app/sentinel/bin/utils/__init__.py

branch = true

[coverage:report]
# Paths to exclude from the coverage percentage
exclude_lines =
    # Standard non-executable constructs
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    if __name__ == .__main__.:
    # Fallback-only branches (tested implicitly via integration tests)
    except ImportError:

show_missing  = true
skip_covered  = true
fail_under    = 80

[coverage:xml]
output = ci/reports/coverage.xml
